<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Página</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
        }

        .card{
            background: white;
            padding: 40px;
            border-radius: 25px;
            text-align: center;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .card:hover{
            transform: scale(1.03);
        }

        .circle{
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            margin: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 35px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        h1{
            color: #333;
            margin-bottom: 10px;
        }

        p{
            color: #555;
            font-size: 18px;
            margin: 5px 0;
        }

        .footer{
            margin-top: 20px;
            font-size: 14px;
            color: gray;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="circle">RM</div>

        <h1>Ramón</h1>

        <p><strong>Grado:</strong> 3°</p>
        <p><strong>Grupo:</strong> C</p>

        <div class="footer">
            Programación Web - Tarea 9
        </div>
    </div>

</body>
</html>
