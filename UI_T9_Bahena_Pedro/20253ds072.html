<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PedroBH - 3C</title>
    <style>
        /* Estilos para el fondo y la estructura */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* Paleta de azules en degradado */
            background: linear-gradient(135deg, #1e3a8a, #3b82f6, #93c5fd);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        /* Estilo para el contenedor de contenido */
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 2.5rem;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        /* Estilo para la imagen */
        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%; /* La hace circular */
            object-fit: cover;
            border: 4px solid white;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            letter-spacing: 2px;
        }

        h2 {
            font-size: 2rem;
            margin: 10px 0 0 0;
            font-weight: 300;
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://share.google/dP6AoQeTyCbUTVaYg" alt="Imagen PedroBH" class="profile-img">
        
        <h1>PedroBH</h1>
        <h2>3C</h2>
    </div>

</body>
</html>

<div class="container">
    <h1>PedroBH</h1>
    <h2>3C</h2>
</div>

</body>
</html>
