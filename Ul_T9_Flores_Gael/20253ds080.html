<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil de Angel Gael</title>
    <style>
        body {
            background-color: #fff5f8; /* Fondo rosa pastel muy claro */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .tarjeta {
            background-color: white;
            border: 4px solid #ffb7d5; /* Rosa chicle */
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(255, 183, 213, 0.4);
            max-width: 350px;
        }

        .nombre {
            color: #ff69b4;
            font-size: 2.5rem;
            margin: 10px 0;
            font-weight: bold;
            text-shadow: 2px 2px #ffe4e1;
        }

        .info {
            color: #777;
            font-size: 1.5rem;
            background-color: #e0f7fa; /* Azul pastel */
            display: inline-block;
            padding: 5px 20px;
            border-radius: 15px;
            margin-top: 15px;
        }

        .imagen-contenedor {
            margin: 20px 0;
        }

        .imagen-contenedor img {
            width: 180px;
            height: 180px;
            border: 5px solid #ffb7d5;
        }

        .decoracion {
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <div class="tarjeta">
        
        <div class="nombre">Angel Gael FR</div>
        
        <div class="imagen-contenedor">
            <img src="momardo.jpg">
        </div>

        <div class="info">3° C</div>
        
        <div style="margin-top: 20px;" class="decoracion">🎀 ✨ 🌸</div>
    </div>

</body>
</html>
